<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teleoperasi Robot ROS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/roslib@1/build/roslib.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center py-10">

    <h1 class="text-3xl font-bold mb-2">Panel Kendali Turtlebot3</h1>
    <p id="status" class="text-red-500 font-semibold mb-6">Status: Terputus</p>

    <div class="bg-white p-4 rounded-lg shadow-lg mb-6 w-[640px] space-y-2">
        <label class="block text-sm font-medium text-gray-700">ROS Bridge URL (ws://...)</label>
        <input id="rosUrlInput" type="text" placeholder="wss://example.trycloudflare.com"
               class="w-full border border-gray-300 rounded px-3 py-2 text-sm">
        <label class="block text-sm font-medium text-gray-700">Camera URL (http://...)</label>
        <input id="camUrlInput" type="text" placeholder="https://example.trycloudflare.com"
               class="w-full border border-gray-300 rounded px-3 py-2 text-sm">
        <button id="connectBtn" class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 font-semibold">
            Connect
        </button>
    </div>

    <div class="flex items-center gap-4 mb-6">
        <p id="robotStatus" class="text-sm px-3 py-1 rounded bg-gray-200 text-gray-600 font-semibold">Robot: —</p>
        <button id="toggleRobotBtn" class="bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 font-semibold disabled:opacity-50">
            Hidupkan Robot
        </button>
    </div>

    <div class="bg-black p-2 rounded-lg shadow-lg mb-2">
        <img id="kamera" src=""
             alt="Kamera Robot" class="w-[640px] h-[480px] object-cover rounded">
    </div>
    <p id="camStatus" class="text-sm text-gray-500 mb-8">Kamera: —</p>

    <div class="grid grid-cols-3 gap-4 w-64 text-center">
        <div></div>
        <button id="btnMaju" class="bg-blue-500 text-white py-4 rounded-lg shadow hover:bg-blue-600 active:bg-blue-800">Maju</button>
        <div></div>

        <button id="btnKiri" class="bg-blue-500 text-white py-4 rounded-lg shadow hover:bg-blue-600 active:bg-blue-800">Kiri</button>
        <button id="btnStop" class="bg-red-500 text-white py-4 rounded-lg shadow hover:bg-red-600 active:bg-red-800 font-bold">STOP</button>
        <button id="btnKanan" class="bg-blue-500 text-white py-4 rounded-lg shadow hover:bg-blue-600 active:bg-blue-800">Kanan</button>

        <div></div>
        <button id="btnMundur" class="bg-blue-500 text-white py-4 rounded-lg shadow hover:bg-blue-600 active:bg-blue-800">Mundur</button>
        <div></div>
    </div>

    <div class="mt-8 w-[640px]">
        <button id="toggleLogBtn" class="w-full bg-gray-700 text-white py-2 rounded-lg hover:bg-gray-600 font-semibold mb-2">
            System Log (1 jam terakhir)
        </button>
        <div id="logPanel" class="hidden bg-white border border-gray-300 rounded-lg shadow-lg max-h-64 overflow-y-auto">
            <table class="w-full text-xs text-left">
                <thead class="bg-gray-100 sticky top-0">
                    <tr>
                        <th class="px-3 py-2 w-1/6">Waktu</th>
                        <th class="px-3 py-2 w-1/6">Aksi</th>
                        <th class="px-3 py-2 w-2/3">Detail</th>
                    </tr>
                </thead>
                <tbody id="logBody"></tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
