services:
  ros-master:
    image: osrf/ros:noetic-desktop-full
    container_name: ros_turtlebot3_container
    ports:
      - "9090:9090"
      - "8080:8080"
    environment:
      - DISPLAY=host.docker.internal:0
      - TURTLEBOT3_MODEL=waffle
    privileged: true
    restart: always
    command: >
      bash -c "
      apt-get update && apt-get install -y ros-noetic-turtlebot3-simulations ros-noetic-turtlebot3 ros-noetic-rosbridge-server ros-noetic-web-video-server &&
      echo 'source /opt/ros/noetic/setup.bash' >> ~/.bashrc &&
      tail -f /dev/null"
